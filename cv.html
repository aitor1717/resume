<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aitor Bazo — CV</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.25rem 3rem;
    background: #fff;
    color: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #14161a; color: #e8e8e8; }
    a { color: #7db8ff; }
    .toolbar a { border-color: #3a3d44; }
    embed { border-color: #3a3d44; }
  }
  h1 { font-size: 1.4rem; margin: 0 0 1rem; }
  .toolbar { margin: .75rem 0 1.25rem; }
  .toolbar a {
    display: inline-block;
    padding: .5rem 1rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    text-decoration: none;
    font-size: .9rem;
    color: inherit;
  }
  embed {
    width: 100%;
    height: 85vh;
    border: 1px solid #ccc;
    border-radius: 8px;
  }
  .fallback { font-size: .85rem; opacity: .7; margin-top: .5rem; }
</style>
</head>
<body>
<h1>Aitor Bazo — CV</h1>
<div class="toolbar">
  <a href="bazo_cv.pdf" download>Descargar PDF</a>
</div>
<embed src="bazo_cv.pdf" type="application/pdf">
<p class="fallback">Si la vista previa no carga, <a href="bazo_cv.pdf">abre el PDF directamente</a>.</p>
</body>
</html>
